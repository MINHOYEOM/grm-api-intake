name: GRM Findings Embed — Lock 재생성 (수동)

# [FIND-1] Codex 감사 F-05(공급망) 완결용 도구 — 전이 의존성 hash-lock 생성기.
#
# ★왜 워크플로인가: lock 은 **설치 대상 플랫폼에서 해상(resolve)해야** 정확하다. embed
#   job 은 ubuntu-latest/cp312 에서 도는데 개발 PC(Windows)에서 pip-compile 을 돌리면
#   플랫폼별 휠·전이 의존성이 달라져 --require-hashes 가 CI 에서 깨진다. 그래서 실제
#   실행 환경과 동일한 러너에서 생성한다.
#
# 사용법(의존성을 올릴 때만):
#   1) requirements-embed.txt(소스 spec)의 == 버전을 수정
#   2) 이 워크플로를 workflow_dispatch 로 실행
#   3) 아티팩트 `requirements-embed-lock` 를 내려받아 requirements-embed.lock 로 커밋
#   4) PR CI green 확인 후 머지 → 다음 embed 실행이 새 lock 으로 --require-hashes 설치
#
# 이 워크플로는 **읽기 전용**이다: 시크릿 미사용·DB 무접촉·git push 없음(아티팩트만 낸다).
# 그래서 privileged 스텝이 없고, 공급망 관점에서 embed job 과 격리된다.

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  compile:
    name: pip-compile --generate-hashes (ubuntu/cp312 = embed job 과 동일 해상)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.12'

      - name: Install pip-tools
        run: |
          python -m pip install --upgrade pip
          # pip-tools 자체는 lock 대상이 아니다(이 job 은 시크릿을 안 쓰고 산출물은
          # 사람이 검토·커밋하는 텍스트뿐이다).
          pip install pip-tools

      - name: Compile lock with hashes
        run: |
          # requirements-embed.txt = 소스 spec(== 고정). 여기서 전이 의존성 전체를
          # 해상하고 각 배포판의 sha256 를 박는다.
          # --allow-unsafe: setuptools/pip 등 build 의존성도 고정(pip-tools 관례).
          pip-compile \
            --generate-hashes \
            --allow-unsafe \
            --output-file=requirements-embed.lock \
            requirements-embed.txt
          echo "===== requirements-embed.lock ====="
          cat requirements-embed.lock

      - name: Verify lock installs with --require-hashes (실제 검증)
        run: |
          # 생성된 lock 이 진짜로 --require-hashes 설치를 통과하는지 같은 러너에서 확인한다.
          # 통과하지 못하는 lock 을 커밋하면 다음 embed 실행이 죽는다.
          python -m venv /tmp/lockcheck
          /tmp/lockcheck/bin/pip install --upgrade pip
          /tmp/lockcheck/bin/pip install --require-hashes -r requirements-embed.lock
          /tmp/lockcheck/bin/python -c "import torch, sentence_transformers, requests; print('lock OK:', torch.__version__, sentence_transformers.__version__)"

      - name: Upload lock artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: requirements-embed-lock
          path: requirements-embed.lock
          retention-days: 7
