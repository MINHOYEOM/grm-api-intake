name: GRM CI (compile + tests)

# push/PR 마다 py_compile + unittest 실행 — 회귀 게이트.
# 수집/Notion 호출 없음(네트워크 불필요), 1분 내 종료.
on:
  push:
    branches: ['**']
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: pip install -r requirements.txt
      # 루트 평면 배치(CLAUDE.md §구조 원칙)를 그대로 신뢰해 *.py 전수 컴파일한다.
      # 수동 열거는 새 모듈이 조용히 게이트를 빠져나가므로 금지 — 목록을 늘리지 말 것.
      - name: py_compile all root modules
        run: |
          shopt -s nullglob
          files=(*.py)
          if [ "${#files[@]}" -eq 0 ]; then
            echo "::error::루트 .py 를 하나도 찾지 못했다 — 글롭이 무너졌다(침묵 통과 방지)"
            exit 1
          fi
          echo "compiling ${#files[@]} root modules:"
          printf '  %s\n' "${files[@]}"
          python -m py_compile "${files[@]}"
      - name: unittest
        run: python -m unittest discover -s tests -v
