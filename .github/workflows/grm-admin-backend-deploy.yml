name: GRM Admin Backend Deploy

# Admin 운영 콘솔의 Supabase DB migration + Edge Functions 배포.
# 시크릿이 없으면 안전하게 skip 하고, 준비되면 workflow_dispatch 한 번으로 백엔드를 활성화한다.

on:
  push:
    branches: [main]
    paths:
      - 'supabase/**'
      - '.github/workflows/grm-admin-backend-deploy.yml'
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: grm-admin-backend-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF || vars.SUPABASE_PROJECT_REF }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      ADMIN_GITHUB_ACTIONS_TOKEN: ${{ secrets.ADMIN_GITHUB_ACTIONS_TOKEN || secrets.GITHUB_ACTIONS_TOKEN }}
      NEWSLETTER_API_KEY: ${{ secrets.NEWSLETTER_API_KEY }}
      GRM_NEWSLETTER_LIST_ID: ${{ vars.GRM_NEWSLETTER_LIST_ID }}
      SUPABASE_URL_PUBLIC: ${{ vars.SUPABASE_URL }}
    steps:
      - uses: actions/checkout@v6.0.2

      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Type-check Admin Edge Functions
        shell: bash
        run: |
          set -euo pipefail
          for file in \
            supabase/functions/admin-supabase/index.ts \
            supabase/functions/admin-github/index.ts \
            supabase/functions/admin-brevo/index.ts
          do
            for attempt in 1 2 3; do
              if deno check "$file"; then
                break
              fi
              if [ "$attempt" = "3" ]; then
                exit 1
              fi
              sleep $((attempt * 2))
            done
          done

      - name: Resolve project ref
        id: ref
        shell: bash
        run: |
          REF="$SUPABASE_PROJECT_REF"
          if [ -z "$REF" ] && [ -n "$SUPABASE_URL_PUBLIC" ]; then
            REF="$(printf '%s' "$SUPABASE_URL_PUBLIC" | sed -E 's#^https://([^.]+)\.supabase\.co.*#\1#')"
          fi
          echo "project_ref=$REF" >> "$GITHUB_OUTPUT"
          if [ -z "$REF" ]; then
            echo "::warning::SUPABASE_PROJECT_REF 또는 vars.SUPABASE_URL 이 없어 Admin backend deploy 를 건너뜁니다."
            echo "ready=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          missing=()
          [ -z "$SUPABASE_ACCESS_TOKEN" ] && missing+=("SUPABASE_ACCESS_TOKEN")
          [ -z "$SUPABASE_SERVICE_ROLE_KEY" ] && missing+=("SUPABASE_SERVICE_ROLE_KEY")
          [ -z "$SUPABASE_DB_PASSWORD" ] && missing+=("SUPABASE_DB_PASSWORD")
          [ -z "$ADMIN_GITHUB_ACTIONS_TOKEN" ] && missing+=("ADMIN_GITHUB_ACTIONS_TOKEN")
          if [ "${#missing[@]}" -gt 0 ]; then
            printf '::warning::Admin backend deploy 시크릿 누락: %s. 코드만 배포되고 백엔드는 skip 됩니다.\n' "${missing[*]}"
            echo "ready=false" >> "$GITHUB_OUTPUT"
          else
            echo "ready=true" >> "$GITHUB_OUTPUT"
          fi

      - uses: supabase/setup-cli@v2.1.1
        if: steps.ref.outputs.ready == 'true'

      - name: Link Supabase project
        if: steps.ref.outputs.ready == 'true'
        shell: bash
        run: supabase link --project-ref "${{ steps.ref.outputs.project_ref }}" --password "$SUPABASE_DB_PASSWORD"

      - name: Push database migrations
        if: steps.ref.outputs.ready == 'true'
        shell: bash
        run: printf 'y\n' | supabase db push --password "$SUPABASE_DB_PASSWORD"

      - name: Set Edge Function secrets
        if: steps.ref.outputs.ready == 'true'
        shell: bash
        run: |
          supabase secrets set --project-ref "${{ steps.ref.outputs.project_ref }}" \
            SUPABASE_SERVICE_ROLE_KEY="$SUPABASE_SERVICE_ROLE_KEY" \
            GITHUB_ACTIONS_TOKEN="$ADMIN_GITHUB_ACTIONS_TOKEN" \
            GITHUB_REPO="$GITHUB_REPOSITORY" \
            GITHUB_REF="main" \
            NEWSLETTER_API_KEY="$NEWSLETTER_API_KEY" \
            GRM_NEWSLETTER_LIST_ID="$GRM_NEWSLETTER_LIST_ID"

      - name: Deploy Admin Edge Functions
        if: steps.ref.outputs.ready == 'true'
        shell: bash
        run: |
          supabase functions deploy admin-supabase --project-ref "${{ steps.ref.outputs.project_ref }}"
          supabase functions deploy admin-github --project-ref "${{ steps.ref.outputs.project_ref }}"
          supabase functions deploy admin-brevo --project-ref "${{ steps.ref.outputs.project_ref }}"
