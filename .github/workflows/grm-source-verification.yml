name: GRM Source Verification (published ↔ original)

# 발행된 483/WL 카드를 **원문과 다시 대조**하는 검증층. 저장소 안에서 끝나는 게이트
# (조립 `lint_false_absence_claims` · CI 스윕 `tests/test_published_briefs_integrity.py`)가
# 구조적으로 못 잡는 결함 하나를 담당한다 — **수집이 실패해 처음부터 못 받은 상세**.
# 저장소 어디에도 "원문에는 관찰이 2건 있었다"는 사실이 없으므로, 원문을 다시 받는 수밖에 없다.
# 근거: 2026-07-20 전수 점검에서 483 8건이 관찰 원문을 가진 채 "관찰 없음"으로 발행돼 있었다.
#
# 발행 파이프와 완전히 분리된 독립 워크플로다(발행을 막지 않는다 — 사후 탐지·이슈 알림).

on:
  schedule:
    # 매주 화요일 04:20 UTC = 13:20 KST. 월요일 발행이 끝나고 하루 뒤 — 그 주 발행분을
    # 가장 이른 시점에 검증하면서, 월요일 크론 혼잡(발행·뉴스레터)과 겹치지 않는 시각.
    - cron: '20 4 * * 2'
  workflow_dispatch:
    inputs:
      weeks:
        description: '최근 N개 발행본 검증 (0=전체)'
        required: false
        default: '2'
        type: string

permissions:
  contents: read
  issues: write        # 불일치 알림 이슈 생성/갱신

concurrency:
  group: grm-source-verification
  cancel-in-progress: false

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: 의존성
        run: pip install -q requests pymupdf

      - name: 원문 대조
        id: verify
        continue-on-error: true      # 불일치(exit 1)는 job 실패가 아니라 이슈로 처리한다
        run: |
          set -o pipefail
          python verify_published_sources.py \
            --weeks "${{ github.event.inputs.weeks || '2' }}" \
            --json source-verification.json \
            --report source-verification.md

      - name: 결과 아티팩트
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: source-verification
          path: |
            source-verification.json
            source-verification.md
          if-no-files-found: warn

      - name: 불일치 시 이슈 생성·갱신
        if: steps.verify.outcome == 'failure'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const body = fs.readFileSync('source-verification.md', 'utf8')
              + `\n\n---\n실행: ${context.runId} · 워크플로 \`grm-source-verification.yml\``;
            const title = '[source-verify] 발행 카드가 원문보다 적게 보여주는 항목이 있습니다';
            // 같은 제목의 열린 이슈가 있으면 본문을 갱신하고 코멘트를 남긴다(이슈 난립 방지).
            const { data: open } = await github.rest.issues.listForRepo({
              owner: context.repo.owner, repo: context.repo.repo,
              state: 'open', labels: 'source-verify', per_page: 20,
            });
            const existing = open.find(i => i.title === title);
            if (existing) {
              await github.rest.issues.update({
                owner: context.repo.owner, repo: context.repo.repo,
                issue_number: existing.number, body,
              });
              core.notice(`기존 이슈 #${existing.number} 갱신`);
            } else {
              const { data: created } = await github.rest.issues.create({
                owner: context.repo.owner, repo: context.repo.repo,
                title, body, labels: ['source-verify'],
              });
              core.notice(`이슈 #${created.number} 생성`);
            }

      - name: 요약
        if: always()
        run: |
          {
            echo "## 원문 대조 결과"
            cat source-verification.md 2>/dev/null || echo "(보고서 없음)"
          } >> "$GITHUB_STEP_SUMMARY"
