{% extends "base.html" %}
{% block content %}
{#- 자료실 · ICH 가이드라인 카탈로그 — 커밋 스냅샷(web/data/library/ich.json) 결정론 렌더.
    토픽 제목은 admin.ich.org 섹션 제목 스냅샷(정적 카탈로그)이며, 공식 링크는
    www.ich.org/page/<slug> 계열 페이지로 연결한다. grm.css 프리즈 보존 위해 스코프 <style>. -#}
<main>
  <div class="wrap page-head">
    <span class="kick reveal" style="animation-delay:.02s">ICH · Guidelines</span>
    <h1 class="reveal" style="animation-delay:.08s">{{ lib.meta.title }}</h1>
    <p class="reveal" style="animation-delay:.14s">FDA·EMA·식약처가 공통으로 채택하는 국제 조화(ICH) 가이드라인의 토픽 카탈로그입니다. 품질(Q)·다분야(M) 계열별로 정리했으며, 각 토픽의 최신 Step·개정본·원문 PDF는 ICH 공식 페이지에서 확인하실 수 있습니다.</p>
    <div class="lib-meta reveal" style="animation-delay:.2s">
      <span class="lib-meta-i"><i class="ti ti-calendar-event" aria-hidden="true"></i>감지 기준일 {{ lib.meta.collected_date }}</span>
      <span class="lib-meta-i"><i class="ti ti-list-details" aria-hidden="true"></i>토픽 {{ lib.meta.topic_count }}</span>
      <a class="lib-meta-link" href="{{ lib.meta.public_base }}" target="_blank" rel="noopener">ICH 공식 사이트 <i class="ti ti-external-link" aria-hidden="true"></i></a>
    </div>
  </div>
  <div class="wrap lib-body">
    {% for s in lib.series %}
    <section class="lib-series">
      <div class="lib-series-h">
        <span class="lib-series-badge">{{ s.letter }}</span>
        <div class="lib-series-t">
          <h2>{{ s.label_ko }} <span>{{ s.label_en }}</span></h2>
          <p>{{ s.blurb }}</p>
        </div>
        <a class="lib-series-link" href="{{ s.official_url }}" target="_blank" rel="noopener">공식 페이지 <i class="ti ti-external-link" aria-hidden="true"></i></a>
      </div>
      <ul class="lib-topics">
        {% for t in s.topics %}
        <li class="lib-topic">
          <a class="lib-topic-a" href="{{ s.official_url }}" target="_blank" rel="noopener">
            <span class="lib-topic-title">{{ t.title }}</span>
            <i class="ti ti-external-link lib-topic-ext" aria-hidden="true"></i>
          </a>
          <span class="lib-chips">
            {% if t.signal_tier == 'Tier 3' %}<span class="lib-tier t3">Tier 3</span>{% elif t.signal_tier == 'Tier 2' %}<span class="lib-tier t2">Tier 2</span>{% else %}<span class="lib-tier t1">Tier 1</span>{% endif %}
            {% if t.qa_relevance == 'Likely' %}<span class="lib-rel">QA 관련</span>{% endif %}
          </span>
        </li>
        {% endfor %}
      </ul>
    </section>
    {% endfor %}
    <p class="lib-foot-note reveal">{{ lib.meta.note }}</p>
  </div>
</main>
<style>
/* [자료실] ICH 카탈로그 — grm.css 토큰만 사용(프리즈 보존). */
.lib-body{padding-bottom:60px}
.lib-meta{display:flex;flex-wrap:wrap;align-items:center;gap:8px 18px;margin-top:22px}
.lib-meta-i{display:inline-flex;align-items:center;gap:6px;font-family:var(--sans);font-size:13px;color:var(--muted)}
.lib-meta-i .ti{font-size:15px;color:var(--lo)}
.lib-meta-link{display:inline-flex;align-items:center;gap:5px;font-family:var(--sans);font-size:13px;font-weight:500;color:var(--coral-2);text-decoration:none}
.lib-meta-link:hover{text-decoration:underline}
.lib-meta-link .ti{font-size:14px}
.lib-series{margin-top:30px}
.lib-series-h{display:flex;align-items:flex-start;gap:14px;padding-bottom:14px;border-bottom:1px solid var(--line-2)}
.lib-series-badge{flex:none;width:40px;height:40px;display:inline-flex;align-items:center;justify-content:center;font-family:var(--serif);font-weight:600;font-size:20px;color:#fff;background:var(--coral);border-radius:var(--rad-s)}
.lib-series-t{flex:1;min-width:0}
.lib-series-t h2{font-family:var(--serif);font-weight:500;font-size:22px;line-height:1.2;color:var(--ink);margin:0}
.lib-series-t h2 span{font-family:var(--sans);font-size:13px;font-weight:500;color:var(--lo);margin-left:6px}
.lib-series-t p{font-size:14px;color:var(--muted);margin:5px 0 0;line-height:1.55}
.lib-series-link{flex:none;display:inline-flex;align-items:center;gap:5px;font-family:var(--sans);font-size:13px;font-weight:500;color:var(--coral-2);text-decoration:none;white-space:nowrap;margin-top:4px}
.lib-series-link:hover{text-decoration:underline}
.lib-series-link .ti{font-size:14px}
.lib-topics{list-style:none;padding:0;margin:8px 0 0;display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:2px 20px}
.lib-topic{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:12px 4px;border-bottom:1px solid var(--line)}
.lib-topic-a{display:inline-flex;align-items:center;gap:8px;min-width:0;text-decoration:none;color:var(--ink)}
.lib-topic-a:hover{color:var(--coral-2)}
.lib-topic-title{font-family:var(--sans);font-size:14.5px;line-height:1.4;overflow:hidden;text-overflow:ellipsis}
.lib-topic-ext{flex:none;font-size:13px;color:var(--lo);opacity:0;transition:opacity .14s var(--ease)}
.lib-topic-a:hover .lib-topic-ext{opacity:1}
.lib-chips{flex:none;display:inline-flex;align-items:center;gap:6px}
.lib-tier{font-family:var(--sans);font-size:11px;font-weight:600;line-height:1;padding:4px 8px;border-radius:999px;white-space:nowrap}
.lib-tier.t3{color:#fff;background:var(--hi)}
.lib-tier.t2{color:var(--med);background:rgba(176,125,23,.13);border:1px solid rgba(176,125,23,.28)}
.lib-tier.t1{color:var(--muted);background:var(--strong);border:1px solid var(--line-2)}
.lib-rel{font-family:var(--sans);font-size:11px;font-weight:500;color:var(--coral-2);background:var(--coral-tint);border:1px solid rgba(194,96,63,.22);padding:4px 8px;border-radius:999px;white-space:nowrap}
.lib-foot-note{margin-top:34px;padding-top:18px;border-top:1px solid var(--line);font-family:var(--sans);font-size:13px;color:var(--muted);line-height:1.65;max-width:70ch}
@media (max-width:640px){ .lib-topics{grid-template-columns:1fr;gap:0} .lib-series-h{flex-wrap:wrap} }
</style>
{% endblock %}
