name: GRM API Intake (Daily)

# 매일 18:17 UTC = 익일 03:17 KST
# Claude Routine (매주 월 07:30 KST) 전에 7일치 수집 완료 보장
# (공식 고지는 최대 60분 지연이나, 2026-06-02/03 실측 ~2.5h 지연 관찰
#  → 2시간 앞당겨 지연 포함 06시 이전 완료 확보)
# 비정각(:17) 사용 — GitHub Actions :00 부하 분산 권장사항 반영
#
# cron 표기:
# minute hour day(month) month day(week)
#  17     18    *           *      *       → 매일 18:17 UTC
on:
  schedule:
    - cron: '17 18 * * *'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (Notion 호출 없이 stdout 만 출력)'
        type: boolean
        default: false
      window_days:
        description: '수집 윈도우 일수 (기본 7)'
        type: string
        default: '7'
      sources:
        description: '수집 소스 제한(공백/쉼표 구분: fr recall ema mhra pics eca wl mfds ich who hc fda483 ispe eu_gmp_ncr none). 비우면 전체'
        type: string
        default: ''
      handoff_doc_ids:
        description: '선택: Routine handoff에 포함할 Document ID 목록(공백/쉼표 구분). PL-10 검증용'
        type: string
        default: ''
      enable_search:
        description: 'Brave Search 수집 활성화 (inherit=repo 변수 상속·기본)'
        type: choice
        options: ['inherit', 'true', 'false']
        default: 'inherit'
      enable_mfds:
        description: 'MFDS 수집 활성화 (inherit=repo 변수 상속·기본)'
        type: choice
        options: ['inherit', 'true', 'false']
        default: 'inherit'
      enable_mfds_law:
        description: 'MFDS 법제처 행정규칙·법령 API 수집 활성화 (기본 off) (inherit=repo 변수 상속·기본)'
        type: choice
        options: ['inherit', 'true', 'false']
        default: 'inherit'
      enable_mfds_recall:
        description: 'MFDS 회수·판매중지 API 수집 활성화 (inherit=repo 변수 상속·기본)'
        type: choice
        options: ['inherit', 'true', 'false']
        default: 'inherit'
      enable_mfds_admin:
        description: 'MFDS 행정처분 API 수집 활성화 (inherit=repo 변수 상속·기본)'
        type: choice
        options: ['inherit', 'true', 'false']
        default: 'inherit'
      enable_mfds_gmp_cert:
        description: 'MFDS GMP 적합판정서 API 수집 활성화 (기본 off) (inherit=repo 변수 상속·기본)'
        type: choice
        options: ['inherit', 'true', 'false']
        default: 'inherit'
      enable_mfds_safety_letter:
        description: 'MFDS 안전성서한 API 수집 활성화 (기본 off) (inherit=repo 변수 상속·기본)'
        type: choice
        options: ['inherit', 'true', 'false']
        default: 'inherit'
      enable_mfds_gmp_inspection:
        description: 'MFDS GMP 실태조사 결과 수집 활성화 (inherit=repo 변수 상속·기본)'
        type: choice
        options: ['inherit', 'true', 'false']
        default: 'inherit'
      enable_gmp_deficiency_table:
        description: 'MFDS GMP 정기실태조사 지적 표 결정론 추출 → deterministic_detail 상세보기 (inherit=repo 변수 상속·기본)'
        type: choice
        options: ['inherit', 'true', 'false']
        default: 'inherit'
      enable_ich:
        description: 'ICH 수집 활성화 (inherit=repo 변수 상속·기본)'
        type: choice
        options: ['inherit', 'true', 'false']
        default: 'inherit'
      enable_who:
        description: 'WHO Prequalification 수집 활성화 (inherit=repo 변수 상속·기본)'
        type: choice
        options: ['inherit', 'true', 'false']
        default: 'inherit'
      enable_hc:
        description: 'Health Canada 수집 활성화 (inherit=repo 변수 상속·기본)'
        type: choice
        options: ['inherit', 'true', 'false']
        default: 'inherit'
      enable_fda483:
        description: 'FDA 483 실사 관찰사항 수집 활성화 (inherit=repo 변수 상속·기본)'
        type: choice
        options: ['inherit', 'true', 'false']
        default: 'inherit'
      enable_fda483_observations:
        description: 'FDA 483 Observation 목록 결정론 추출 → deterministic_detail 상세보기 (inherit=repo 변수 상속·기본)'
        type: choice
        options: ['inherit', 'true', 'false']
        default: 'inherit'
      # (enable_ispe input 없음 — workflow_dispatch inputs GitHub 상한 25개 도달로 input 을
      #  두지 않는다. 수동 opt-in 은 `sources: ispe` 토큰(RunConfig `or "ispe" in active`),
      #  상시 활성은 vars.ENABLE_ISPE. 2026-07-13 dispatch 422 실측 교훈.)
      enable_moleg_api:
        description: '법제처 ogLmPp API opt-in (inherit=repo 변수 상속·기본)'
        type: choice
        options: ['inherit', 'true', 'false']
        default: 'inherit'
      enable_scrape:
        description: 'Web Scrape 수집 활성화 (inherit=repo 변수 상속·기본)'
        type: choice
        options: ['inherit', 'true', 'false']
        default: 'inherit'
      enable_whopir_excerpt:
        description: 'WHOPIR PDF 결함 excerpt 추출 (ENABLE_WHO 전제, 기본: vars.ENABLE_WHOPIR_EXCERPT 또는 false) (inherit=repo 변수 상속·기본)'
        type: choice
        options: ['inherit', 'true', 'false']
        default: 'inherit'
      enable_wl_body:
        description: 'FDA WL 편지 본문 위반 excerpt 추출 (inherit=repo 변수 상속·기본)'
        type: choice
        options: ['inherit', 'true', 'false']
        default: 'inherit'
      enable_modality_tag:
        description: '제품군(Modality) 태그 기록 — Notion에 Modality 속성 생성 후 켤 것 (inherit=repo 변수 상속·기본)'
        type: choice
        options: ['inherit', 'true', 'false']
        default: 'inherit'
      enable_handoff_v2:
        description: 'handoff v2 생성 (K3 — scaffold/slots) (inherit=repo 변수 상속·기본)'
        type: choice
        options: ['inherit', 'true', 'false']
        default: 'inherit'
      enable_web_brief_emit:
        description: '§1-B: 빈슬롯 web brief(grm-web-card/v1) 자동 산출 → artifact (ENABLE_HANDOFF_V2 전제) (inherit=repo 변수 상속·기본)'
        type: choice
        options: ['inherit', 'true', 'false']
        default: 'inherit'

permissions:
  contents: read
  issues: write  # 실패 시 자동 이슈 생성용

concurrency:
  group: grm-intake
  cancel-in-progress: false

jobs:
  collect:
    name: Collect sources → Notion Intake
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      GRM_HEALTH_JSON: grm-health.json
      # §1-B 영구배선: job-level 로 둬 collector(산출)와 upload 스텝(조건/경로)이 동일 값을
      # 본다(step-scoped env 는 타 스텝서 미해석 — grm-web-deploy runner.temp 버그 교훈).
      # inputs/vars/github 컨텍스트는 job-level env 에서 해석 가능(runner.* 는 불가와 구분).
      ENABLE_WEB_BRIEF_EMIT: ${{ (github.event_name == 'workflow_dispatch' && inputs.enable_web_brief_emit != 'inherit') && inputs.enable_web_brief_emit || vars.ENABLE_WEB_BRIEF_EMIT || 'false' }}
      GRM_WEB_BRIEF_DIR: ${{ vars.GRM_WEB_BRIEF_DIR || '.' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Set up Python
        uses: actions/setup-python@v6.2.0
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Show run context (KST)
        run: |
          echo "UTC now : $(date -u '+%Y-%m-%d %H:%M:%S')"
          echo "KST now : $(TZ='Asia/Seoul' date '+%Y-%m-%d %H:%M:%S')"

      - name: Run collector
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
          OPENFDA_API_KEY: ${{ secrets.OPENFDA_API_KEY }}
          BRAVE_API_KEY: ${{ secrets.BRAVE_API_KEY }}
          DATA_GO_KR_KEY: ${{ secrets.DATA_GO_KR_KEY }}
          DATA_GO_KR_SERVICE_KEY: ${{ secrets.DATA_GO_KR_SERVICE_KEY }}
          MFDS_HTTP_PROXY: ${{ secrets.MFDS_HTTP_PROXY }}
          LAW_GO_KR_OC: ${{ secrets.LAW_GO_KR_OC }}
          # [FIND-1 M4a] collect_intake → Supabase 직행 append. SUPABASE_URL 은 vars(웹 배포와 동일 공개
          # 프로젝트 URL), SERVICE_ROLE_KEY 는 secrets(기존 admin-backend-deploy 와 동일 키 재사용) — 신규 secret 아님.
          SUPABASE_URL: ${{ vars.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          MFDS_RSS_BOARD_MODE: ${{ vars.MFDS_RSS_BOARD_MODE || 'all' }}
          MFDS_RSS_BOARD_IDS: ${{ vars.MFDS_RSS_BOARD_IDS || '' }}
          # workflow_dispatch 입력을 env 변수로만 받아 shell 본문에 직접 삽입 금지
          GRM_DRY_RUN: ${{ inputs.dry_run }}
          GRM_WINDOW_DAYS: ${{ inputs.window_days }}
          GRM_SOURCES: ${{ inputs.sources }}
          GRM_HANDOFF_DOC_IDS: ${{ inputs.handoff_doc_ids }}
          # github.event_name을 env로 노출 — shell 본문 ${{ }} 직접 삽입 방지 (W2)
          GRM_EVENT_NAME: ${{ github.event_name }}
          # Phase 2a feature flags — **3-상태 입력**(inherit/true/false) 해석. 불가침 계약 3가지:
          #   ① 입력 미지정(inherit) dispatch = 예약 실행과 동일 = vars.ENABLE_* 상속
          #   ② 사용자가 명시적으로 'false' 지정 = false 유지(vars 가 켜 뒀어도 덮지 않음)
          #   ③ schedule 경로 무변경 = vars.* || 기본값
          #
          # 왜 boolean 을 못 쓰나(2026-07-20 실장애로 확정) — boolean 입력은 "미지정"과
          # "명시적 false"를 구분할 수 없다. 미지정 시 선언된 default(대개 false)가 그대로
          # 들어오기 때문이다. 그래서 옛 관용구
          #     (event_name == 'workflow_dispatch') && format('{0}', inputs.*) || vars.* || '…'
          # 는 format('{0}', false) = 문자열 "false" = **truthy** 라 거기서 short-circuit 되어,
          # **입력을 아무것도 주지 않은 dispatch 가 vars 로 켜 둔 기능을 조용히 껐다**
          # (실제 피해: 2026-07-20 수동 재실행이 ENABLE_FDA_483_OBSERVATIONS 를 false 로 뒤집어
          #  483 관찰 추출이 통째로 빠졌다 → 그 주 스캐폴드가 못 쓰게 됐다).
          # 2026-07-13 에 handoff v2 계열만 쓰던 대안
          #     (event_name == 'workflow_dispatch' && inputs.*) && 'true' || vars.* || '…'
          # 은 ①은 지키지만 **②를 깬다** — 명시적 false 가 다시 vars 로 덮인다.
          # 두 결함을 동시에 없애려면 "미지정"을 표현할 제3의 값이 필요하다 → 'inherit'.
          #
          # 입력 개수는 GitHub 상한 25개에 이미 도달해 있으므로(현재 정확히 25),
          # boolean → choice **교체**로 개수를 늘리지 않는다. 새 플래그 추가 시 input 없이
          # vars 전용으로 두는 기존 관례(ENABLE_ISPE 등)를 따를 것.
          # 이 관용구는 tests/test_workflow_flag_resolution.py 가 전수 스캔으로 강제한다.
          ENABLE_SEARCH: ${{ (github.event_name == 'workflow_dispatch' && inputs.enable_search != 'inherit') && inputs.enable_search || vars.ENABLE_SEARCH || 'false' }}
          ENABLE_MFDS: ${{ (github.event_name == 'workflow_dispatch' && inputs.enable_mfds != 'inherit') && inputs.enable_mfds || vars.ENABLE_MFDS || 'true' }}
          ENABLE_MFDS_LAW: ${{ (github.event_name == 'workflow_dispatch' && inputs.enable_mfds_law != 'inherit') && inputs.enable_mfds_law || vars.ENABLE_MFDS_LAW || 'false' }}
          ENABLE_MFDS_RECALL: ${{ (github.event_name == 'workflow_dispatch' && inputs.enable_mfds_recall != 'inherit') && inputs.enable_mfds_recall || vars.ENABLE_MFDS_RECALL || 'true' }}
          ENABLE_MFDS_ADMIN: ${{ (github.event_name == 'workflow_dispatch' && inputs.enable_mfds_admin != 'inherit') && inputs.enable_mfds_admin || vars.ENABLE_MFDS_ADMIN || 'true' }}
          ENABLE_MFDS_GMP_CERT: ${{ (github.event_name == 'workflow_dispatch' && inputs.enable_mfds_gmp_cert != 'inherit') && inputs.enable_mfds_gmp_cert || vars.ENABLE_MFDS_GMP_CERT || 'false' }}
          ENABLE_MFDS_SAFETY_LETTER: ${{ (github.event_name == 'workflow_dispatch' && inputs.enable_mfds_safety_letter != 'inherit') && inputs.enable_mfds_safety_letter || vars.ENABLE_MFDS_SAFETY_LETTER || 'false' }}
          ENABLE_MFDS_GMP_INSPECTION: ${{ (github.event_name == 'workflow_dispatch' && inputs.enable_mfds_gmp_inspection != 'inherit') && inputs.enable_mfds_gmp_inspection || vars.ENABLE_MFDS_GMP_INSPECTION || 'true' }}
          # [상세보기 결정론 승격 §16] 정기실태조사 지적 표 → deterministic_detail. ENABLE_MFDS_GMP_INSPECTION 전제·기본 off(추출 실패는 graceful=요약카드 유지).
          ENABLE_GMP_DEFICIENCY_TABLE: ${{ (github.event_name == 'workflow_dispatch' && inputs.enable_gmp_deficiency_table != 'inherit') && inputs.enable_gmp_deficiency_table || vars.ENABLE_GMP_DEFICIENCY_TABLE || 'false' }}
          ENABLE_ICH: ${{ (github.event_name == 'workflow_dispatch' && inputs.enable_ich != 'inherit') && inputs.enable_ich || vars.ENABLE_ICH || 'false' }}
          ENABLE_WHO: ${{ (github.event_name == 'workflow_dispatch' && inputs.enable_who != 'inherit') && inputs.enable_who || vars.ENABLE_WHO || 'false' }}
          ENABLE_HC: ${{ (github.event_name == 'workflow_dispatch' && inputs.enable_hc != 'inherit') && inputs.enable_hc || vars.ENABLE_HC || 'false' }}
          # FDA 483 실사 관찰사항 — 현행 OII HTML/DataTables 소스로 부활. repo var 로 false override 가능.
          ENABLE_FDA_483: ${{ (github.event_name == 'workflow_dispatch' && inputs.enable_fda483 != 'inherit') && inputs.enable_fda483 || vars.ENABLE_FDA_483 || 'true' }}
          # FDA 483 Observation 번호 목록 결정론 상세보기. 기본 off — 실패는 graceful=요약카드 유지.
          ENABLE_FDA_483_OBSERVATIONS: ${{ (github.event_name == 'workflow_dispatch' && inputs.enable_fda483_observations != 'inherit') && inputs.enable_fda483_observations || vars.ENABLE_FDA_483_OBSERVATIONS || 'false' }}
          # [483 분석층] 483 전문 확보 = deep_analysis fan-out 대상. Observation 결정론과 독립·기본 off(활성=repo 변수).
          ENABLE_FDA_483_DEEP: ${{ vars.ENABLE_FDA_483_DEEP || 'false' }}
          # [전문지 브리핑 소스확장 2026-07-13] ISPE iSpeak RSS 수집 — opt-in Expert Secondary.
          # input 없음(dispatch inputs 25개 상한) — 수동은 sources=ispe 토큰, 상시는 vars.
          ENABLE_ISPE: ${{ vars.ENABLE_ISPE || 'false' }}
          # [EU GMP NCR 2026-07-23] EudraGMDP GMP 비준수 — dispatch 입력 없이 vars 전용
          # (입력 25 상한 회피·ISPE 관례). 상시 활성은 vars.ENABLE_EU_GMP_NCR=true.
          ENABLE_EU_GMP_NCR: ${{ vars.ENABLE_EU_GMP_NCR || 'false' }}
          ENABLE_MOLEG_API: ${{ (github.event_name == 'workflow_dispatch' && inputs.enable_moleg_api != 'inherit') && inputs.enable_moleg_api || vars.ENABLE_MOLEG_API || 'false' }}
          ENABLE_SCRAPE: ${{ (github.event_name == 'workflow_dispatch' && inputs.enable_scrape != 'inherit') && inputs.enable_scrape || vars.ENABLE_SCRAPE || 'false' }}
          # WHY-1: 글로벌 소스 결함 excerpt(기본 off — dry-run 검증 후 on). 실패는 graceful(키 미기록).
          ENABLE_WHOPIR_EXCERPT: ${{ (github.event_name == 'workflow_dispatch' && inputs.enable_whopir_excerpt != 'inherit') && inputs.enable_whopir_excerpt || vars.ENABLE_WHOPIR_EXCERPT || 'false' }}
          ENABLE_WL_BODY: ${{ (github.event_name == 'workflow_dispatch' && inputs.enable_wl_body != 'inherit') && inputs.enable_wl_body || vars.ENABLE_WL_BODY || 'false' }}
          # [WL 심층분석 fan-out] 편지 전문(全文) 확보 = deep_analysis 대상. ENABLE_WL_BODY(excerpt)와 독립·기본 off.
          ENABLE_WL_BODY_FULL: ${{ vars.ENABLE_WL_BODY_FULL || 'false' }}
          # [소스확장 2026-07-02] 행정처분 다단락 Body 확보 = deep_analysis(admin) 대상. WL_BODY_FULL 과 동형·기본 off(활성=repo 변수).
          ENABLE_MFDS_ADMIN_BODY_FULL: ${{ vars.ENABLE_MFDS_ADMIN_BODY_FULL || 'false' }}
          # [전문지 브리핑 v2 2026-07-13] ECA 기사(gmp-compliance.org) 본문 흡수 = Routine
          # summary 입력 풍부화(§ECA 본문 흡수). WL_BODY_FULL 과 동형·기본 off(활성=repo 변수).
          # 실패(403/timeout)는 collect_eca_rss 내부에서 graceful — 이 워크플로 단계는 무관.
          ENABLE_ECA_ARTICLE_EXCERPT: ${{ vars.ENABLE_ECA_ARTICLE_EXCERPT || 'false' }}
          # [전문지 브리핑 소스확장] ISPE 기사 본문 흡수 — ECA_ARTICLE_EXCERPT 와 동형·기본 off(활성=repo 변수).
          ENABLE_ISPE_ARTICLE_EXCERPT: ${{ vars.ENABLE_ISPE_ARTICLE_EXCERPT || 'false' }}
          # 제품군 확장: Notion 'Modality' 속성 생성 후 true 로. 속성 미생성 상태로 켜도
          # 수집기 preflight 가 감지해 그 실행만 태그를 끄고 수집은 계속(graceful degrade) + health warning.
          ENABLE_MODALITY_TAG: ${{ (github.event_name == 'workflow_dispatch' && inputs.enable_modality_tag != 'inherit') && inputs.enable_modality_tag || vars.ENABLE_MODALITY_TAG || 'false' }}
          # K3 handoff v2 (scaffold/slots). ★수동 dispatch 도 입력 미설정 시 vars 로 폴백한다
          # (2026-07-13: 수집 실패 후 수동 재실행이 입력 없이 v1 handoff 를 만들어 v16 Routine 이
          # schema v1 하드가드로 중단됐다 — schedule 은 vars=true 로 v2 인데 수동만 v1 로 갈리는 함정).
          ENABLE_HANDOFF_V2: ${{ (github.event_name == 'workflow_dispatch' && inputs.enable_handoff_v2 != 'inherit') && inputs.enable_handoff_v2 || vars.ENABLE_HANDOFF_V2 || 'false' }}
          # PL-10b/B1 멱등성 근본해결 (Handoff Ref 상태기계). 기본 off — schedule는 vars
          # 미설정 시 v1(날짜 윈도우+K4-1) 유지. 속성 미생성 상태로 켜도 preflight 가
          # 그 실행만 v1 폴백(graceful degrade) + health warning.
          ENABLE_HANDOFF_IDEMPOTENCY_V2: ${{ vars.ENABLE_HANDOFF_IDEMPOTENCY_V2 || 'false' }}
          # E2(URL전수검사): 행정처분 건별 L1 을 collect 시 resolve&verify(기본 off — collector
          # 행위·K3 관찰 보호). on 이면 nedrug getItem 후보를 verify 해 L1 승격/강등.
          ENABLE_MFDS_URL_VERIFY: ${{ vars.ENABLE_MFDS_URL_VERIFY || 'false' }}
          # [FIND-1 M4a] SQLite sidecar 와 대칭·독립 배선. 기본 off — secret 미등록이면 collect 가 WARN
          # 후 자동 비활성(hard fail 없음). FINDINGS_APPEND 는 APPEND 도 true 여야 findings 까지 포함.
          ENABLE_FINDINGS_SUPABASE_APPEND: ${{ vars.ENABLE_FINDINGS_SUPABASE_APPEND || 'false' }}
          ENABLE_FINDINGS_SUPABASE_FINDINGS_APPEND: ${{ vars.ENABLE_FINDINGS_SUPABASE_FINDINGS_APPEND || 'false' }}
          # §1-B(ENABLE_WEB_BRIEF_EMIT·GRM_WEB_BRIEF_DIR)는 job-level env 에 정의(upload 스텝과 공유).
        run: |
          # bash array 방식 — 인자를 문자열 연결하지 않아 quoting/injection 문제 없음
          args=()
          if [ "$GRM_EVENT_NAME" = "workflow_dispatch" ]; then
            if [ "$GRM_DRY_RUN" = "true" ]; then args+=(--dry-run); fi

            # W1: 범위 검증 — 비정수 입력 시 경고 후 기본값 7; 범위(1-90) 초과 시 exit 1
            if printf '%s' "$GRM_WINDOW_DAYS" | grep -qE '^[0-9]+$'; then
              WINDOW_DAYS_VAL="$GRM_WINDOW_DAYS"
            else
              echo "::warning ::window_days is not an integer — using default 7"
              WINDOW_DAYS_VAL="7"
            fi
            if (( WINDOW_DAYS_VAL < 1 || WINDOW_DAYS_VAL > 90 )); then
              echo "::error ::window_days=$WINDOW_DAYS_VAL out of range [1, 90]"
              exit 1
            fi
            args+=(--window-days "$WINDOW_DAYS_VAL")

            if [ -n "$GRM_SOURCES" ]; then
              # 쉼표도 공백으로 처리. 허용된 source 토큰만 --sources 인자로 전달.
              read -r -a SOURCE_TOKENS <<< "$(printf '%s' "$GRM_SOURCES" | tr ',' ' ')"
              valid_sources=(fr recall ema mhra pics eca wl mfds ich who hc fda483 ispe eu_gmp_ncr none)
              source_args=()
              for src in "${SOURCE_TOKENS[@]}"; do
                ok=false
                for valid in "${valid_sources[@]}"; do
                  if [ "$src" = "$valid" ]; then ok=true; break; fi
                done
                if [ "$ok" != "true" ]; then
                  echo "::error ::invalid source token"
                  exit 1
                fi
                source_args+=("$src")
              done
              if [ "${#source_args[@]}" -gt 0 ]; then
                args+=(--sources "${source_args[@]}")
              fi
            fi
            if [ -n "$GRM_HANDOFF_DOC_IDS" ]; then
              read -r -a HANDOFF_DOC_ID_TOKENS <<< "$(printf '%s' "$GRM_HANDOFF_DOC_IDS" | tr ',' ' ')"
              handoff_doc_id_args=()
              for doc_id in "${HANDOFF_DOC_ID_TOKENS[@]}"; do
                if ! printf '%s' "$doc_id" | grep -qE '^[A-Za-z0-9_.:-]+$'; then
                  echo "::error ::invalid handoff document id token"
                  exit 1
                fi
                handoff_doc_id_args+=("$doc_id")
              done
              if [ "${#handoff_doc_id_args[@]}" -gt 0 ]; then
                args+=(--handoff-doc-ids "${handoff_doc_id_args[@]}")
              fi
            fi
          fi
          if [ "$GRM_DRY_RUN" != "true" ]; then
            args+=(--emit-routine-handoff)
          fi
          python collect_intake.py "${args[@]}"

      # §1-B 영구배선(Option A): 빈슬롯 web brief 를 artifact 로 업로드한다. 사람이 내려받아
      # web/data/briefs/ 에 커밋 → GRM Web Deploy 트리거(무인 라이브 0 = D5 게이트 보존).
      # ENABLE_WEB_BRIEF_EMIT off 면 파일 부재 → if-no-files-found:ignore 로 무해 스킵.
      - name: Upload empty-slot web brief (§1-B)
        if: ${{ always() && env.ENABLE_WEB_BRIEF_EMIT == 'true' }}
        uses: actions/upload-artifact@v4
        with:
          name: grm-web-brief
          path: ${{ env.GRM_WEB_BRIEF_DIR }}/brief_web_*.json
          if-no-files-found: ignore
          retention-days: 30

      - name: Open issue on failure
        if: failure() && github.event_name == 'schedule'
        uses: actions/github-script@v9.0.0
        with:
          script: |
            const fs = require('fs');
            const path = require('path');
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const runUrl = `${process.env.GITHUB_SERVER_URL}/${process.env.GITHUB_REPOSITORY}/actions/runs/${process.env.GITHUB_RUN_ID}`;
            const fallbackDate = new Date().toISOString().slice(0, 10);
            const healthPath = path.join(process.env.GITHUB_WORKSPACE, process.env.GRM_HEALTH_JSON || 'grm-health.json');
            let health = null;
            if (fs.existsSync(healthPath)) {
              try {
                health = JSON.parse(fs.readFileSync(healthPath, 'utf8'));
              } catch (error) {
                health = { parse_error: String(error) };
              }
            }
            const findings = health?.health?.failures || [];
            const warnings = health?.health?.warnings || [];
            const findingLines = findings.length
              ? findings.map((item) => `- [${item.code}] ${item.source}: ${item.message}${item.detail ? ` — ${item.detail}` : ''}`)
              : ['- health JSON 없음 또는 failure finding 없음. Actions 로그와 step summary를 확인하세요.'];
            const warningLines = warnings.length
              ? ['', '경고:', ...warnings.map((item) => `- [${item.code}] ${item.source}: ${item.message}${item.detail ? ` — ${item.detail}` : ''}`)]
              : [];

            async function ensureLabel(name, color, description) {
              try {
                await github.rest.issues.getLabel({ owner, repo, name });
              } catch (error) {
                if (error.status !== 404) throw error;
                await github.rest.issues.createLabel({ owner, repo, name, color, description });
              }
            }

            await ensureLabel('grm-intake', '0e8a16', 'GRM intake automation');
            await ensureLabel('automation-failure', 'b60205', 'GRM automation failure');

            const runDate = health?.run_date_kst || fallbackDate;
            await github.rest.issues.create({
              owner,
              repo,
              title: `GRM Intake 실패 — ${runDate}`,
              body: [
                'GRM API Intake 수집기(Daily)가 실패했습니다.',
                '',
                `- Run: ${runUrl}`,
                `- Trigger: ${context.eventName}`,
                `- Run date (KST): ${runDate}`,
                `- Health status: ${health?.health?.status || 'unavailable'}`,
                '',
                '실패 판정:',
                ...findingLines,
                ...warningLines,
                '',
                '점검 항목:',
                '1. Notion Integration 토큰 유효성',
                '2. Notion DB 스키마 (속성 이름·타입)',
                '3. Federal Register / OpenFDA / RSS / FDA WL / MFDS / ICH / WHO / Health Canada 상태',
                '4. GitHub Secrets 값 (NOTION_TOKEN, OPENFDA_API_KEY, BRAVE_API_KEY, DATA_GO_KR_SERVICE_KEY, MFDS_HTTP_PROXY, LAW_GO_KR_OC)',
                '5. Repository Variables (ENABLE_SEARCH, ENABLE_MFDS, ENABLE_MFDS_LAW, ENABLE_MFDS_RECALL, ENABLE_MFDS_ADMIN, ENABLE_MFDS_GMP_CERT, ENABLE_MFDS_SAFETY_LETTER, ENABLE_MFDS_GMP_INSPECTION, ENABLE_GMP_DEFICIENCY_TABLE, ENABLE_ICH, ENABLE_WHO, ENABLE_HC, ENABLE_FDA_483, ENABLE_FDA_483_OBSERVATIONS, ENABLE_MOLEG_API, ENABLE_SCRAPE, ENABLE_WHOPIR_EXCERPT, ENABLE_WL_BODY, ENABLE_WL_BODY_FULL, ENABLE_MFDS_ADMIN_BODY_FULL, ENABLE_ECA_ARTICLE_EXCERPT, ENABLE_MODALITY_TAG, MFDS_RSS_BOARD_MODE, MFDS_RSS_BOARD_IDS) 설정 확인',
                '6. MFDS 활성화 시 RSS/API 상태 확인; ENABLE_MOLEG_API=true인 경우 DATA_GO_KR_KEY/OC/IP 인가 확인',
                '',
                '실패해도 Claude Routine 은 v14.5 WebSearch-only 모드로 graceful degradation 됩니다.',
              ].join('\n'),
              labels: ['grm-intake', 'automation-failure'],
            });

      - name: Open or update warning issue
        if: success() && github.event_name == 'schedule'
        uses: actions/github-script@v9.0.0
        with:
          script: |
            const fs = require('fs');
            const path = require('path');
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const healthPath = path.join(process.env.GITHUB_WORKSPACE, process.env.GRM_HEALTH_JSON || 'grm-health.json');
            if (!fs.existsSync(healthPath)) { console.log('health JSON not found; skipping'); return; }
            let health;
            try { health = JSON.parse(fs.readFileSync(healthPath, 'utf8')); }
            catch (error) { console.log(`health JSON parse failed: ${error}`); return; }
            const warnings = health?.health?.warnings || [];
            const title = 'GRM Intake 운영 경고';
            async function ensureLabel(name, color, description) {
              try { await github.rest.issues.getLabel({ owner, repo, name }); }
              catch (error) { if (error.status !== 404) throw error; await github.rest.issues.createLabel({ owner, repo, name, color, description }); }
            }
            await ensureLabel('grm-intake', '0e8a16', 'GRM intake automation');
            await ensureLabel('automation-warning', 'fbca04', 'GRM automation warning');
            const { data: issues } = await github.rest.issues.listForRepo({
              owner, repo, state: 'open', labels: 'automation-warning', per_page: 100,
            });
            const existing = issues.find((issue) => issue.title === title);
            // 경고 구성 서명 = 정렬된 고유 code 집합 (휘발성 필드 제외 → 지속 차단 시 고정)
            const sig = [...new Set(warnings.map((w) => w.code))].sort().join('|');
            const SIG_RE = /<!--\s*grm-warn-sig:\s*(.*?)\s*-->/;
            const prevSig = existing ? ((existing.body || '').match(SIG_RE)?.[1] ?? null) : null;
            const runUrl = `${process.env.GITHUB_SERVER_URL}/${process.env.GITHUB_REPOSITORY}/actions/runs/${process.env.GITHUB_RUN_ID}`;
            function buildBody() {
              return [
                'GRM Intake 운영 경고 현황 — **이 본문은 매 scheduled run 마다 자동 갱신**되며, **알림(코멘트)은 경고 구성이 바뀔 때만** 발송됩니다.',
                '',
                `- 최신 Run: ${runUrl}`,
                `- 최신 Run date (KST): ${health.run_date_kst || 'unknown'}`,
                `- Health status: ${health?.health?.status || 'warning'}`,
                '',
                warnings.length ? '현재 경고:' : '현재 경고 없음.',
                ...warnings.map((w) => `- [${w.code}] ${w.source}: ${w.message}${w.detail ? ` — ${w.detail}` : ''}`),
                '',
                `<!-- grm-warn-sig: ${sig} -->`,
              ].join('\n');
            }
            // (A) 경고 0 → 해소 처리(직전에 경고가 있던 이슈만 1회 코멘트 후 close)
            if (!warnings.length) {
              if (existing && prevSig !== null) {
                await github.rest.issues.createComment({ owner, repo, issue_number: existing.number,
                  body: '✅ 최신 scheduled run 에서 경고가 모두 해소되었습니다. 이슈를 닫습니다.' });
                await github.rest.issues.update({ owner, repo, issue_number: existing.number, state: 'closed' });
              }
              console.log('no warnings; nothing to alert');
              return;
            }
            // (B) 최초 발생 → 이슈 생성(=1회 알림)
            if (!existing) {
              await github.rest.issues.create({ owner, repo, title, body: buildBody(),
                labels: ['grm-intake', 'automation-warning'] });
              console.log('created warning issue');
              return;
            }
            // (C) 기존 이슈 → 본문 silent 갱신(편집=알림 없음)
            await github.rest.issues.update({ owner, repo, issue_number: existing.number, body: buildBody() });
            // (D) 서명이 바뀐 경우에만 코멘트(=알림)
            if (prevSig !== sig) {
              await github.rest.issues.createComment({ owner, repo, issue_number: existing.number,
                body: `⚠️ 경고 구성 변경: \`${prevSig ?? '없음'}\` → \`${sig}\`\n\n${buildBody()}` });
              console.log(`signature changed (${prevSig} -> ${sig}); commented`);
            } else {
              console.log(`signature unchanged (${sig}); body updated silently, no comment`);
            }
