name: GRM API Intake (Daily)

# 매일 18:17 UTC = 익일 03:17 KST
# Claude Routine (매주 월 07:30 KST) 전에 7일치 수집 완료 보장
# (공식 고지는 최대 60분 지연이나, 2026-06-02/03 실측 ~2.5h 지연 관찰
#  → 2시간 앞당겨 지연 포함 06시 이전 완료 확보)
# 비정각(:17) 사용 — GitHub Actions :00 부하 분산 권장사항 반영
#
# cron 표기:
# minute hour day(month) month day(week)
#  17     18    *           *      *       → 매일 18:17 UTC
on:
  schedule:
    - cron: '17 18 * * *'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (Notion 호출 없이 stdout 만 출력)'
        type: boolean
        default: false
      window_days:
        description: '수집 윈도우 일수 (기본 7)'
        type: string
        default: '7'
      sources:
        description: '수집 소스 제한(공백/쉼표 구분: fr recall ema mhra pics eca wl mfds ich who hc none). 비우면 전체'
        type: string
        default: ''
      handoff_doc_ids:
        description: '선택: Routine handoff에 포함할 Document ID 목록(공백/쉼표 구분). PL-10 검증용'
        type: string
        default: ''
      enable_search:
        description: 'Brave Search 수집 활성화 (기본: vars.ENABLE_SEARCH 또는 false)'
        type: boolean
        default: false
      enable_mfds:
        description: 'MFDS 수집 활성화 (기본: vars.ENABLE_MFDS 또는 true)'
        type: boolean
        default: true
      enable_mfds_recall:
        description: 'MFDS 회수·판매중지 API 수집 활성화 (기본: vars.ENABLE_MFDS_RECALL 또는 true)'
        type: boolean
        default: true
      enable_mfds_admin:
        description: 'MFDS 행정처분 API 수집 활성화 (기본: vars.ENABLE_MFDS_ADMIN 또는 true)'
        type: boolean
        default: true
      enable_mfds_gmp_inspection:
        description: 'MFDS GMP 실태조사 결과 수집 활성화 (기본: vars.ENABLE_MFDS_GMP_INSPECTION 또는 true)'
        type: boolean
        default: true
      enable_ich:
        description: 'ICH 수집 활성화 (기본: vars.ENABLE_ICH 또는 false)'
        type: boolean
        default: false
      enable_who:
        description: 'WHO Prequalification 수집 활성화 (기본: vars.ENABLE_WHO 또는 false)'
        type: boolean
        default: false
      enable_hc:
        description: 'Health Canada 수집 활성화 (기본: vars.ENABLE_HC 또는 false)'
        type: boolean
        default: false
      enable_moleg_api:
        description: '법제처 ogLmPp API opt-in (기본: vars.ENABLE_MOLEG_API 또는 false)'
        type: boolean
        default: false
      enable_scrape:
        description: 'Web Scrape 수집 활성화 (기본: vars.ENABLE_SCRAPE 또는 false)'
        type: boolean
        default: false
      enable_modality_tag:
        description: '제품군(Modality) 태그 기록 — Notion에 Modality 속성 생성 후 켤 것 (기본: vars.ENABLE_MODALITY_TAG 또는 false)'
        type: boolean
        default: false
      enable_handoff_v2:
        description: 'handoff v2 생성 (K3 — scaffold/slots)'
        type: boolean
        default: false

permissions:
  contents: read
  issues: write  # 실패 시 자동 이슈 생성용

concurrency:
  group: grm-intake
  cancel-in-progress: false

jobs:
  collect:
    name: Collect sources → Notion Intake
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      GRM_HEALTH_JSON: grm-health.json

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Set up Python
        uses: actions/setup-python@v6.2.0
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Show run context (KST)
        run: |
          echo "UTC now : $(date -u '+%Y-%m-%d %H:%M:%S')"
          echo "KST now : $(TZ='Asia/Seoul' date '+%Y-%m-%d %H:%M:%S')"

      - name: Run collector
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
          OPENFDA_API_KEY: ${{ secrets.OPENFDA_API_KEY }}
          BRAVE_API_KEY: ${{ secrets.BRAVE_API_KEY }}
          DATA_GO_KR_KEY: ${{ secrets.DATA_GO_KR_KEY }}
          DATA_GO_KR_SERVICE_KEY: ${{ secrets.DATA_GO_KR_SERVICE_KEY }}
          # workflow_dispatch 입력을 env 변수로만 받아 shell 본문에 직접 삽입 금지
          GRM_DRY_RUN: ${{ inputs.dry_run }}
          GRM_WINDOW_DAYS: ${{ inputs.window_days }}
          GRM_SOURCES: ${{ inputs.sources }}
          GRM_HANDOFF_DOC_IDS: ${{ inputs.handoff_doc_ids }}
          # github.event_name을 env로 노출 — shell 본문 ${{ }} 직접 삽입 방지 (W2)
          GRM_EVENT_NAME: ${{ github.event_name }}
          # Phase 2a feature flags:
          # workflow_dispatch: (event_name == 'workflow_dispatch') && format('{0}', inputs.*) 로
          #   boolean false를 "false" 문자열(non-empty=truthy)로 변환 후 short-circuit
          #   → 사용자가 명시적으로 false 설정 시 vars.ENABLE_* 로 override되는 버그 방지
          # schedule: event_name != 'workflow_dispatch' → false → vars.* || 'false' fallback
          ENABLE_SEARCH: ${{ (github.event_name == 'workflow_dispatch') && format('{0}', inputs.enable_search) || vars.ENABLE_SEARCH || 'false' }}
          ENABLE_MFDS: ${{ (github.event_name == 'workflow_dispatch') && format('{0}', inputs.enable_mfds) || vars.ENABLE_MFDS || 'true' }}
          ENABLE_MFDS_RECALL: ${{ (github.event_name == 'workflow_dispatch') && format('{0}', inputs.enable_mfds_recall) || vars.ENABLE_MFDS_RECALL || 'true' }}
          ENABLE_MFDS_ADMIN: ${{ (github.event_name == 'workflow_dispatch') && format('{0}', inputs.enable_mfds_admin) || vars.ENABLE_MFDS_ADMIN || 'true' }}
          ENABLE_MFDS_GMP_INSPECTION: ${{ (github.event_name == 'workflow_dispatch') && format('{0}', inputs.enable_mfds_gmp_inspection) || vars.ENABLE_MFDS_GMP_INSPECTION || 'true' }}
          ENABLE_ICH: ${{ (github.event_name == 'workflow_dispatch') && format('{0}', inputs.enable_ich) || vars.ENABLE_ICH || 'false' }}
          ENABLE_WHO: ${{ (github.event_name == 'workflow_dispatch') && format('{0}', inputs.enable_who) || vars.ENABLE_WHO || 'false' }}
          ENABLE_HC: ${{ (github.event_name == 'workflow_dispatch') && format('{0}', inputs.enable_hc) || vars.ENABLE_HC || 'false' }}
          ENABLE_MOLEG_API: ${{ (github.event_name == 'workflow_dispatch') && format('{0}', inputs.enable_moleg_api) || vars.ENABLE_MOLEG_API || 'false' }}
          ENABLE_SCRAPE: ${{ (github.event_name == 'workflow_dispatch') && format('{0}', inputs.enable_scrape) || vars.ENABLE_SCRAPE || 'false' }}
          # 제품군 확장: Notion 'Modality' 속성 생성 후 true 로. 속성 미생성 상태로 켜도
          # 수집기 preflight 가 감지해 그 실행만 태그를 끄고 수집은 계속(graceful degrade) + health warning.
          ENABLE_MODALITY_TAG: ${{ (github.event_name == 'workflow_dispatch') && format('{0}', inputs.enable_modality_tag) || vars.ENABLE_MODALITY_TAG || 'false' }}
          # K3 handoff v2 (scaffold/slots). 기본 off — schedule는 vars 미설정 시 v1 경로 유지.
          ENABLE_HANDOFF_V2: ${{ (github.event_name == 'workflow_dispatch') && format('{0}', inputs.enable_handoff_v2) || vars.ENABLE_HANDOFF_V2 || 'false' }}
        run: |
          # bash array 방식 — 인자를 문자열 연결하지 않아 quoting/injection 문제 없음
          args=()
          if [ "$GRM_EVENT_NAME" = "workflow_dispatch" ]; then
            if [ "$GRM_DRY_RUN" = "true" ]; then args+=(--dry-run); fi

            # W1: 범위 검증 — 비정수 입력 시 경고 후 기본값 7; 범위(1-90) 초과 시 exit 1
            if printf '%s' "$GRM_WINDOW_DAYS" | grep -qE '^[0-9]+$'; then
              WINDOW_DAYS_VAL="$GRM_WINDOW_DAYS"
            else
              echo "::warning ::window_days is not an integer — using default 7"
              WINDOW_DAYS_VAL="7"
            fi
            if (( WINDOW_DAYS_VAL < 1 || WINDOW_DAYS_VAL > 90 )); then
              echo "::error ::window_days=$WINDOW_DAYS_VAL out of range [1, 90]"
              exit 1
            fi
            args+=(--window-days "$WINDOW_DAYS_VAL")

            if [ -n "$GRM_SOURCES" ]; then
              # 쉼표도 공백으로 처리. 허용된 source 토큰만 --sources 인자로 전달.
              read -r -a SOURCE_TOKENS <<< "$(printf '%s' "$GRM_SOURCES" | tr ',' ' ')"
              valid_sources=(fr recall ema mhra pics eca wl mfds ich who hc none)
              source_args=()
              for src in "${SOURCE_TOKENS[@]}"; do
                ok=false
                for valid in "${valid_sources[@]}"; do
                  if [ "$src" = "$valid" ]; then ok=true; break; fi
                done
                if [ "$ok" != "true" ]; then
                  echo "::error ::invalid source token"
                  exit 1
                fi
                source_args+=("$src")
              done
              if [ "${#source_args[@]}" -gt 0 ]; then
                args+=(--sources "${source_args[@]}")
              fi
            fi
            if [ -n "$GRM_HANDOFF_DOC_IDS" ]; then
              read -r -a HANDOFF_DOC_ID_TOKENS <<< "$(printf '%s' "$GRM_HANDOFF_DOC_IDS" | tr ',' ' ')"
              handoff_doc_id_args=()
              for doc_id in "${HANDOFF_DOC_ID_TOKENS[@]}"; do
                if ! printf '%s' "$doc_id" | grep -qE '^[A-Za-z0-9_.:-]+$'; then
                  echo "::error ::invalid handoff document id token"
                  exit 1
                fi
                handoff_doc_id_args+=("$doc_id")
              done
              if [ "${#handoff_doc_id_args[@]}" -gt 0 ]; then
                args+=(--handoff-doc-ids "${handoff_doc_id_args[@]}")
              fi
            fi
          fi
          if [ "$GRM_DRY_RUN" != "true" ]; then
            args+=(--emit-routine-handoff)
          fi
          python collect_intake.py "${args[@]}"

      - name: Open issue on failure
        if: failure() && github.event_name == 'schedule'
        uses: actions/github-script@v9.0.0
        with:
          script: |
            const fs = require('fs');
            const path = require('path');
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const runUrl = `${process.env.GITHUB_SERVER_URL}/${process.env.GITHUB_REPOSITORY}/actions/runs/${process.env.GITHUB_RUN_ID}`;
            const fallbackDate = new Date().toISOString().slice(0, 10);
            const healthPath = path.join(process.env.GITHUB_WORKSPACE, process.env.GRM_HEALTH_JSON || 'grm-health.json');
            let health = null;
            if (fs.existsSync(healthPath)) {
              try {
                health = JSON.parse(fs.readFileSync(healthPath, 'utf8'));
              } catch (error) {
                health = { parse_error: String(error) };
              }
            }
            const findings = health?.health?.failures || [];
            const warnings = health?.health?.warnings || [];
            const findingLines = findings.length
              ? findings.map((item) => `- [${item.code}] ${item.source}: ${item.message}${item.detail ? ` — ${item.detail}` : ''}`)
              : ['- health JSON 없음 또는 failure finding 없음. Actions 로그와 step summary를 확인하세요.'];
            const warningLines = warnings.length
              ? ['', '경고:', ...warnings.map((item) => `- [${item.code}] ${item.source}: ${item.message}${item.detail ? ` — ${item.detail}` : ''}`)]
              : [];

            async function ensureLabel(name, color, description) {
              try {
                await github.rest.issues.getLabel({ owner, repo, name });
              } catch (error) {
                if (error.status !== 404) throw error;
                await github.rest.issues.createLabel({ owner, repo, name, color, description });
              }
            }

            await ensureLabel('grm-intake', '0e8a16', 'GRM intake automation');
            await ensureLabel('automation-failure', 'b60205', 'GRM automation failure');

            const runDate = health?.run_date_kst || fallbackDate;
            await github.rest.issues.create({
              owner,
              repo,
              title: `GRM Intake 실패 — ${runDate}`,
              body: [
                'GRM API Intake 수집기(Daily)가 실패했습니다.',
                '',
                `- Run: ${runUrl}`,
                `- Trigger: ${context.eventName}`,
                `- Run date (KST): ${runDate}`,
                `- Health status: ${health?.health?.status || 'unavailable'}`,
                '',
                '실패 판정:',
                ...findingLines,
                ...warningLines,
                '',
                '점검 항목:',
                '1. Notion Integration 토큰 유효성',
                '2. Notion DB 스키마 (속성 이름·타입)',
                '3. Federal Register / OpenFDA / RSS / FDA WL / MFDS / ICH / WHO / Health Canada 상태',
                '4. GitHub Secrets 값 (NOTION_TOKEN, OPENFDA_API_KEY, BRAVE_API_KEY, DATA_GO_KR_SERVICE_KEY)',
                '5. Repository Variables (ENABLE_SEARCH, ENABLE_MFDS, ENABLE_MFDS_RECALL, ENABLE_MFDS_ADMIN, ENABLE_MFDS_GMP_INSPECTION, ENABLE_ICH, ENABLE_WHO, ENABLE_HC, ENABLE_MOLEG_API, ENABLE_SCRAPE, ENABLE_MODALITY_TAG) 설정 확인',
                '6. MFDS 활성화 시 RSS/API 상태 확인; ENABLE_MOLEG_API=true인 경우 DATA_GO_KR_KEY/OC/IP 인가 확인',
                '',
                '실패해도 Claude Routine 은 v14.5 WebSearch-only 모드로 graceful degradation 됩니다.',
              ].join('\n'),
              labels: ['grm-intake', 'automation-failure'],
            });

      - name: Open or update warning issue
        if: success() && github.event_name == 'schedule'
        uses: actions/github-script@v9.0.0
        with:
          script: |
            const fs = require('fs');
            const path = require('path');
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const healthPath = path.join(process.env.GITHUB_WORKSPACE, process.env.GRM_HEALTH_JSON || 'grm-health.json');
            if (!fs.existsSync(healthPath)) {
              console.log('health JSON not found; skipping warning issue');
              return;
            }

            let health;
            try {
              health = JSON.parse(fs.readFileSync(healthPath, 'utf8'));
            } catch (error) {
              console.log(`health JSON parse failed: ${error}`);
              return;
            }

            const warnings = health?.health?.warnings || [];
            if (!warnings.length) {
              console.log('no health warnings; skipping warning issue');
              return;
            }

            async function ensureLabel(name, color, description) {
              try {
                await github.rest.issues.getLabel({ owner, repo, name });
              } catch (error) {
                if (error.status !== 404) throw error;
                await github.rest.issues.createLabel({ owner, repo, name, color, description });
              }
            }

            await ensureLabel('grm-intake', '0e8a16', 'GRM intake automation');
            await ensureLabel('automation-warning', 'fbca04', 'GRM automation warning');

            const runUrl = `${process.env.GITHUB_SERVER_URL}/${process.env.GITHUB_REPOSITORY}/actions/runs/${process.env.GITHUB_RUN_ID}`;
            const title = 'GRM Intake 운영 경고';
            const lines = [
              `GRM Intake scheduled run에서 warning이 감지되었습니다.`,
              '',
              `- Run: ${runUrl}`,
              `- Run date (KST): ${health.run_date_kst || 'unknown'}`,
              `- Health status: ${health?.health?.status || 'warning'}`,
              '',
              '경고:',
              ...warnings.map((item) => `- [${item.code}] ${item.source}: ${item.message}${item.detail ? ` — ${item.detail}` : ''}`),
            ];
            const body = lines.join('\n');

            const { data: issues } = await github.rest.issues.listForRepo({
              owner,
              repo,
              state: 'open',
              labels: 'automation-warning',
              per_page: 100,
            });
            const existing = issues.find((issue) => issue.title === title);
            if (existing) {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: existing.number,
                body,
              });
              return;
            }

            await github.rest.issues.create({
              owner,
              repo,
              title,
              body,
              labels: ['grm-intake', 'automation-warning'],
            });
