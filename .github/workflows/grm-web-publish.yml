name: GRM Web Publish (assemble)

# 웹이관 P5 — 라우틴 델타 → 발행본 자동 조립 + PR. 2026-07-06 수동 조립 사고의 코드화.
#
# 파이프:
#   델타(web/data/deltas/delta_{date}.json, 라우틴/사람이 커밋)
#     + 스캐폴드(grm-intake 의 grm-web-brief 아티팩트, 전 intake 카드·빈 슬롯)
#       → assemble_publish_brief.py (채택 필터·render_order 재배열·coverage/agencies/categories/
#          evidence 재계산·코드 가드·inject_slots 슬롯 주입)
#       → 골든 재동결(web/tests/test_render.py --freeze, 기본 env)
#       → web/data/briefs/ 커밋 + PR
#         → grm-web-deploy.yml 이 프리뷰 생성 → 사람이 프리뷰 확인 후 production 머지 = 라이브(D5)
#
# 무인 라이브 0: 이 워크플로우는 **PR 까지만**. production 머지는 유일한 사람 게이트로 보존.
# 수집(grm-intake)·배포(grm-web-deploy)와 별도 파일·별도 트리거·독립 재실행(D8).

on:
  workflow_dispatch:
    inputs:
      publish_date:
        description: '발행일 YYYY-MM-DD (web/data/deltas/delta_{date}.json 존재 필요)'
        required: true
        type: string
      intake_run_id:
        description: '스캐폴드 아티팩트를 가진 grm-intake run id (미지정 시 날짜로 최신 성공 run 탐색)'
        required: false
        type: string
  push:
    # [2026-07-20] branches 필터 필수 — 종전엔 필터가 없어 **어느 브랜치든** 델타 파일을 건드리면
    # 발행이 돌았다(작업 브랜치에서 델타를 고치는 정정 PR 이 발행 PR 을 앞질러 여는 위험).
    # 델타는 delta-bridge 가 main 에 커밋하는 것이 정상 경로이므로 main 으로 좁힌다.
    branches:
      - main
    paths:
      - 'web/data/deltas/delta_*.json'

permissions:
  contents: write        # 발행 브랜치 push
  pull-requests: write   # PR 생성
  actions: read          # 타 워크플로우 아티팩트 다운로드

concurrency:
  group: grm-web-publish-${{ github.event.inputs.publish_date || github.ref }}
  cancel-in-progress: false

jobs:
  assemble:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          # ★ 발행 브랜치 push 를 PAT(오너)로 — 기본 GITHUB_TOKEN(봇) push 는 재발행(PR
          #   synchronize) 시 CI 를 github-actions[bot] 트리거로 만들어 "워크플로 실행 승인
          #   필요(action_required)" 게이트에 걸린다 → 발행 PR CI 가 green 이 안 돼 Admin
          #   승인 버튼이 잠긴다(2026-07-13). PAT push = 오너 트리거 → 게이트 없이 CI 실행.
          token: ${{ secrets.ADMIN_GITHUB_ACTIONS_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Resolve publish_date + delta 경로
        id: r
        run: |
          set -euo pipefail
          PUB="${{ github.event.inputs.publish_date }}"
          if [ -z "$PUB" ]; then
            BEFORE="${{ github.event.before }}"
            SHA="${{ github.sha }}"
            if echo "$BEFORE" | grep -qE '^0{40}$'; then
              DELTA_FILE=$(git diff-tree --no-commit-id --name-only -r "$SHA" -- 'web/data/deltas/delta_*.json' | head -1)
            else
              DELTA_FILE=$(git diff --name-only "$BEFORE" "$SHA" -- 'web/data/deltas/delta_*.json' 2>/dev/null | head -1)
            fi
            PUB=$(echo "$DELTA_FILE" | sed -E 's#.*delta_([0-9]{4})_([0-9]{2})_([0-9]{2})\.json#\1-\2-\3#')
          fi
          [ -n "$PUB" ] || { echo "::error::publish_date 미해결"; exit 1; }
          echo "$PUB" | grep -qE '^[0-9]{4}-[0-9]{2}-[0-9]{2}$' || { echo "::error::형식 오류 $PUB"; exit 1; }
          U=$(echo "$PUB" | tr '-' '_')
          DELTA="web/data/deltas/delta_${U}.json"
          [ -f "$DELTA" ] || { echo "::error::델타 없음: $DELTA — 라우틴이 먼저 커밋해야 함"; exit 1; }
          echo "pub=$PUB"   >> "$GITHUB_OUTPUT"
          echo "under=$U"   >> "$GITHUB_OUTPUT"
          echo "delta=$DELTA" >> "$GITHUB_OUTPUT"

      - name: 스캐폴드 아티팩트(grm-web-brief) 다운로드
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          RID="${{ github.event.inputs.intake_run_id }}"
          if [ -z "$RID" ]; then
            # KST 발행일 스케줄 run = UTC 전날 18:17. createdAt 이 발행일±1일 UTC 로 시작하는 최신 성공 run.
            # ★ headBranch=main 필수(2026-07-20) — 작업 브랜치에서 dispatch 한 intake run 이 더 최신이면
            #   그쪽이 뽑혔고, 그런 run 에는 grm-web-brief 아티팩트가 없어 "no valid artifacts found" 로
            #   죽었다. 스캐폴드는 main 스케줄 run 이 내는 것이 정본이다.
            PREV=$(date -u -d "${{ steps.r.outputs.pub }} -1 day" +%Y-%m-%d)
            RID=$(gh run list -R "${{ github.repository }}" --workflow grm-intake.yml \
                    --status success --branch main --json databaseId,createdAt -L 40 \
                    -q "[.[] | select((.createdAt|startswith(\"$PREV\")) or (.createdAt|startswith(\"${{ steps.r.outputs.pub }}\")))][0].databaseId")
          fi
          [ -n "$RID" ] || { echo "::error::intake run 미발견 — intake_run_id 입력으로 지정"; exit 1; }
          echo "intake run: $RID"
          mkdir -p _scaffold
          gh run download "$RID" -R "${{ github.repository }}" -n grm-web-brief -D _scaffold
          test -f "_scaffold/brief_web_${{ steps.r.outputs.under }}.json" \
            || { echo "::error::스캐폴드에 ${{ steps.r.outputs.under }} 없음 — run/날짜 확인"; exit 1; }

      - name: 조립(assemble_publish_brief) — 채택 필터·메타 재계산·코드 가드
        run: |
          set -euo pipefail
          DEEP_ARGS=()
          DEEP_FILE="web/data/deltas/deep_${{ steps.r.outputs.under }}.json"
          if [ -f "$DEEP_FILE" ]; then
            echo "::notice::deep_analysis 델타 발견: $DEEP_FILE (게이트 통과분만 병합)"
            DEEP_ARGS=(--deep "$DEEP_FILE")
          else
            echo "::notice::deep_analysis 델타 없음 — 6슬롯만 발행(정상)"
          fi
          python assemble_publish_brief.py \
            --scaffold "_scaffold/brief_web_${{ steps.r.outputs.under }}.json" \
            --delta    "${{ steps.r.outputs.delta }}" \
            --out      "web/data/briefs/brief_web_${{ steps.r.outputs.under }}.json" \
            "${DEEP_ARGS[@]}"

      - name: 골든 재동결(기본 env — prod 변수 미주입) + 렌더 스모크
        run: |
          set -euo pipefail
          python web/tests/test_render.py --freeze
          python web/render.py --data web/data/briefs --out _dist_smoke >/dev/null
          rm -rf _dist_smoke

      - name: 커밋 + PR (프리뷰 트리거)
        env:
          GH_TOKEN: ${{ secrets.GRM_PUBLISH_TOKEN || secrets.ADMIN_GITHUB_ACTIONS_TOKEN || github.token }}
        run: |
          set -euo pipefail
          # ★ 발행일당 캐노니컬 짧은 브랜치 하나만 쓴다(재실행 시 -run_id 접미 금지). 긴 브랜치는
          #   Cloudflare Pages 프리뷰 별칭(publish-brief-YYYY-MM-DD-...)이 잘려 404 가 나기 때문(2026-07-13).
          #   재실행(예: deep_analysis 백필 후)은 같은 브랜치를 force-update → 프리뷰 별칭·PR 이 안정 유지.
          BR="publish/brief-${{ steps.r.outputs.pub }}"
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git switch -c "$BR"
          git add "web/data/briefs/brief_web_${{ steps.r.outputs.under }}.json" web/tests/golden
          git commit -m "publish(web): ${{ steps.r.outputs.pub }} 주간 브리프 (자동 조립)"
          git push -u origin "$BR" --force
          # 열린 PR 이 있으면 재사용(force-push 로 갱신됨), 닫혀 있으면 재오픈, 없으면 생성.
          STATE=$(gh pr view "$BR" --json state -q .state 2>/dev/null || echo NONE)
          if [ "$STATE" = "OPEN" ]; then
            echo "::notice::기존 열린 발행 PR 재사용(force-push 로 갱신) — $BR"
          elif [ "$STATE" = "CLOSED" ]; then
            gh pr reopen "$BR" && echo "::notice::닫힌 발행 PR 재오픈 — $BR"
          else
            gh pr create -R "${{ github.repository }}" -B main -H "$BR" \
              -t "publish(web): ${{ steps.r.outputs.pub }} 주간 브리프" \
              -b "assemble_publish_brief 자동 조립(채택 필터·render_order 재배열·coverage/agencies/categories/evidence 재계산) + 골든 재동결. 프리뷰 확인 후 머지 = 라이브(D5)."
          fi
