{% extends "base.html" %}
{% block content %}
{#- 자료실 · MFDS 지침·고시 아카이브 — 커밋 스냅샷(web/data/library/mfds.json) 결정론 렌더.
    수집순(수집일 desc) 누적 리스트. "최신 수집분" 배지는 최대 수집일 배치를 결정론적으로
    파생(now() 미사용). grm.css 프리즈 보존 위해 스코프 <style>. -#}
<main>
  <div class="wrap page-head">
    <span class="kick reveal" style="animation-delay:.02s">MFDS · Guidance</span>
    <h1 class="reveal" style="animation-delay:.08s">{{ lib.meta.title }}</h1>
    <p class="reveal" style="animation-delay:.14s">식약처(MFDS)가 공개한 지침·안내서·고시·행정예고를 수집한 순서대로 모았습니다. 주간 브리프에서 한 번 다룬 문서도 이곳에서 다시 찾아볼 수 있습니다. 법적 효력과 최신본은 반드시 공식 원문에서 확인하세요.</p>
    <div class="lib-meta reveal" style="animation-delay:.2s">
      <span class="lib-meta-i"><i class="ti ti-calendar-event" aria-hidden="true"></i>최근 수집 {{ lib.meta.latest_collected_date }}</span>
      <span class="lib-meta-i"><i class="ti ti-files" aria-hidden="true"></i>총 {{ lib.meta.item_count }}건</span>
    </div>
  </div>
  <div class="wrap lib-body">
    <ul class="lib-items">
      {% for it in lib['items'] %}
      <li class="lib-item{% if it.is_latest_batch %} is-new{% endif %}">
        <a class="lib-item-a" href="{{ it.official_url }}" target="_blank" rel="noopener">
          <span class="lib-item-title">{{ it.title }}</span>
          <i class="ti ti-external-link lib-item-ext" aria-hidden="true"></i>
        </a>
        <div class="lib-item-meta">
          <span class="lib-type">{{ it.type_label }}</span>
          <span class="lib-date"><i class="ti ti-calendar" aria-hidden="true"></i>수집 {{ it.collected_date }}</span>
          {% if it.is_latest_batch %}<span class="lib-new">최신 수집분</span>{% endif %}
        </div>
      </li>
      {% endfor %}
    </ul>
    <p class="lib-foot-note reveal">{{ lib.meta.note }}</p>
  </div>
</main>
<style>
/* [자료실] MFDS 아카이브 — grm.css 토큰만 사용(프리즈 보존). */
.lib-body{padding-bottom:60px}
.lib-meta{display:flex;flex-wrap:wrap;align-items:center;gap:8px 18px;margin-top:22px}
.lib-meta-i{display:inline-flex;align-items:center;gap:6px;font-family:var(--sans);font-size:13px;color:var(--muted)}
.lib-meta-i .ti{font-size:15px;color:var(--lo)}
.lib-items{list-style:none;padding:0;margin:26px 0 0}
.lib-item{display:flex;flex-direction:column;gap:8px;padding:16px 2px 15px;border-bottom:1px solid var(--line)}
.lib-item.is-new{padding-left:14px;border-left:2px solid var(--coral);border-bottom-color:var(--line)}
.lib-item-a{display:inline-flex;align-items:baseline;gap:8px;text-decoration:none;color:var(--ink)}
.lib-item-a:hover{color:var(--coral-2)}
.lib-item-title{font-family:var(--sans);font-size:15.5px;line-height:1.5;font-weight:500}
.lib-item-ext{flex:none;font-size:13px;color:var(--lo);align-self:center;opacity:0;transition:opacity .14s var(--ease)}
.lib-item-a:hover .lib-item-ext{opacity:1}
.lib-item-meta{display:flex;flex-wrap:wrap;align-items:center;gap:8px 14px}
.lib-type{font-family:var(--sans);font-size:11.5px;font-weight:600;color:var(--med);background:rgba(176,125,23,.11);border:1px solid rgba(176,125,23,.24);padding:3px 9px;border-radius:999px;white-space:nowrap}
.lib-date{display:inline-flex;align-items:center;gap:5px;font-family:var(--sans);font-size:12.5px;color:var(--muted)}
.lib-date .ti{font-size:13px;color:var(--lo)}
.lib-new{font-family:var(--sans);font-size:11px;font-weight:600;color:#fff;background:var(--coral);padding:3px 9px;border-radius:999px;white-space:nowrap}
.lib-foot-note{margin-top:34px;padding-top:18px;border-top:1px solid var(--line);font-family:var(--sans);font-size:13px;color:var(--muted);line-height:1.65;max-width:70ch}
@media (max-width:640px){ .lib-item-title{font-size:15px} }
</style>
{% endblock %}
