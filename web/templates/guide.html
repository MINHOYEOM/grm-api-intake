{% extends "base.html" %}
{% block content %}
{#- 이용 안내(트랙 C 2차 웨이브) — web/data/guide_content.md(정본)를 render.py 의 제한
    md 서브셋 변환기로 결정론 렌더한 본문(guide_body=Markup). grm.css 프리즈 보존 위해
    레이아웃은 기존 토큰만 쓰는 스코프 <style>(자료실 선례). -#}
<main>
  <div class="wrap page-head">
    <span class="kick reveal" style="animation-delay:.02s">User Guide</span>
    <h1 class="reveal" style="animation-delay:.08s">{{ guide_title }}</h1>
    <p class="reveal" style="animation-delay:.14s">GRM을 처음 보는 분도 핵심을 빠르게 파악할 수 있도록, 브리프 카드 읽는 법부터 findings 검색 사용법, 이용 시 유의사항까지 정리했습니다.</p>
  </div>
  <div class="wrap guide-body reveal" style="animation-delay:.2s">
    {{ guide_body }}
    <aside class="guide-x">
      <div class="guide-x-t">
        <b>규제 용어가 낯설다면</b>
        <span>GMP·CAPA·데이터 완전성·무균 공정 등 자주 나오는 용어를 쉬운 풀이와 공식 출처로 설명합니다.</span>
      </div>
      <a class="guide-x-go" href="{{ rel_root }}glossary/index.html">용어사전 열기 <i class="ti ti-arrow-right" aria-hidden="true"></i></a>
    </aside>
  </div>
</main>
<style>
/* [이용안내] 본문 프로즈 — grm.css 토큰만 사용(프리즈 보존). */
.guide-body{max-width:74ch;padding:8px 0 64px;font-family:var(--sans);color:var(--body);font-size:16px;line-height:1.72}
.guide-body h2{font-family:var(--serif);font-weight:600;font-size:24px;line-height:1.28;color:var(--ink);margin:46px 0 12px;padding-top:18px;border-top:1px solid var(--line)}
.guide-body h2:first-of-type{margin-top:20px;padding-top:0;border-top:0}
.guide-body h3{font-family:var(--serif);font-weight:600;font-size:18px;line-height:1.35;color:var(--ink);margin:30px 0 8px}
.guide-body p{margin:0 0 14px}
.guide-body ul,.guide-body ol{margin:0 0 16px;padding-left:22px}
.guide-body li{margin:0 0 7px;line-height:1.68}
.guide-body strong{font-weight:600;color:var(--ink)}
.guide-body code{font-family:var(--mono);font-size:.88em;color:var(--coral-2);background:var(--soft);border:1px solid var(--line-2);border-radius:5px;padding:1px 6px;white-space:nowrap}
.guide-x{display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap;margin-top:40px;padding:20px 22px;background:var(--soft);border:1px solid var(--line-2);border-radius:var(--rad)}
.guide-x-t{display:flex;flex-direction:column;gap:3px;min-width:0}
.guide-x-t b{font-family:var(--serif);font-weight:600;font-size:16px;color:var(--ink)}
.guide-x-t span{font-size:13.5px;color:var(--muted);line-height:1.55}
.guide-x-go{flex:none;display:inline-flex;align-items:center;gap:6px;font-family:var(--sans);font-size:14px;font-weight:500;color:#fff;background:var(--coral);border-radius:var(--rad-s);padding:10px 16px;text-decoration:none;transition:background .16s var(--ease)}
.guide-x-go:hover{background:var(--coral-2)}
.guide-x-go .ti{font-size:16px;transition:transform .16s var(--ease)}
.guide-x-go:hover .ti{transform:translateX(3px)}
@media (max-width:640px){ .guide-body{font-size:15.5px} .guide-body h2{font-size:21px} }
</style>
{% endblock %}
