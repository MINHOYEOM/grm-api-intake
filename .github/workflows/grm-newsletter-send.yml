name: GRM Newsletter Send

# 뉴스레터 발송(T1.3) — 수집(`grm-intake.yml`)·웹배포(`grm-web-deploy.yml`)와 **완전 별도
# 파일·별도 트리거·최소권한**(D8). 한쪽 실패가 다른쪽을 멈추지 않는다. 발행된 주차
# web-card JSON(`web/data/briefs/brief_web_{date}.json`)을 입력으로, 짧은 티저 메일을
# 만들어 관리형 SaaS(Brevo)로 발송한다(풍부한 카드는 웹 브리프에서 — 이메일 전용 풀카드 X).
#
# 발송 게이트 4겹(되돌릴 수 없는 발송 — 무인 발송 0):
#   ① 발행검증(구조·provenance) — `newsletter.run_gates`(스키마·발행일·카드·면책 + 메일이
#      우리 페이지만 링크·추적 파라미터 0). 발행 시점 Brief Lint(handoff provenance)는 별개로
#      Routine 에서 이미 실행됨 — 여기선 web-card 산출물 무결성을 발송 직전 재확인.
#   ② 링크체크(`web/linkcheck.py` 재사용) — 그 호 카드 링크에 broken 이 있으면 발송 **보류**
#      (비차단 enrich 가 아니라 발송 게이트로 승격). degraded(일시)·KR-egress 스킵은 비차단.
#   ③ 멱등 — 캠페인명(`publish_date` 파생) 키. 이미 발송된 호면 재발송 0(`find_campaign`).
#   ④ 사람 승인 — `workflow_dispatch`(수동 트리거) + send 잡 `environment: production`(required
#      reviewer). 자동/스케줄 발송 경로 0(D5 라이브 게이트 정신).
#
# 비용(D9): GitHub Actions 무료분 + SaaS 무료 티어. 유료 서비스 0.

on:
  workflow_dispatch:
    inputs:
      publish_date:
        description: '발송할 호의 발행일 (YYYY-MM-DD, web/data/briefs 에 존재해야 함)'
        required: true
        type: string
      mode:
        description: 'validate=게이트만(발송 0) · test=테스트 발송(GRM_NEWSLETTER_TEST_EMAILS) · send=실발송'
        required: true
        default: 'validate'
        type: choice
        options:
          - validate
          - test
          - send

# 최소권한 — 콘텐츠 read 만(발송은 SaaS 시크릿으로, GitHub 쓰기 권한 불필요).
permissions:
  contents: read

concurrency:
  # 같은 호 동시 발송 차단(멱등이 이중 안전망이지만 동시성도 끊는다).
  group: grm-newsletter-${{ github.event.inputs.publish_date }}
  cancel-in-progress: false

jobs:
  # ── 게이트 ①②(구조·provenance·링크체크) + 메일 HTML 아티팩트(D5 사람 검토) ──
  validate-build:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Validate + build teaser (gates ①②)
        env:
          # 입력은 env 로 전달(쉘 ${{ }} 직접 보간 금지 — 스크립트 인젝션 회피).
          PUBLISH_DATE: ${{ github.event.inputs.publish_date }}
          GRM_SITE_BASE_URL: ${{ vars.GRM_SITE_BASE_URL || 'https://grm-weekly-brief.pages.dev' }}
        run: |
          mkdir -p email_preview
          python web/newsletter.py \
            --publish-date "$PUBLISH_DATE" \
            --mode validate \
            --out "email_preview/newsletter_${PUBLISH_DATE}.html"

      - name: Upload email preview (D5 검토)
        uses: actions/upload-artifact@v4
        with:
          name: grm-newsletter-preview
          path: email_preview
          if-no-files-found: error

  # ── 발송(test/send) — 게이트 ③ 멱등 + ④ 사람 승인(environment) ──────────────
  #   validate=게이트만이면 이 잡은 건너뛴다(발송 경로 자체가 없음).
  send:
    needs: validate-build
    if: ${{ github.event.inputs.mode != 'validate' }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # 사람 승인 게이트(④) — GitHub Settings → Environments 에서 'production' 에 required
    # reviewer 등록 시, 이 잡은 승인 전까지 보류된다(무인 발송 0). 미설정이면 즉시 실행되므로
    # workflow_dispatch(수동) 만이 유일 게이트가 된다 — reviewer 등록을 §사람 후속에 명시.
    environment: production
    env:
      BREVO_API_KEY: ${{ secrets.BREVO_API_KEY }}
      GRM_NEWSLETTER_LIST_ID: ${{ vars.GRM_NEWSLETTER_LIST_ID }}
      GRM_NEWSLETTER_SENDER_EMAIL: ${{ vars.GRM_NEWSLETTER_SENDER_EMAIL }}
      GRM_NEWSLETTER_SENDER_NAME: ${{ vars.GRM_NEWSLETTER_SENDER_NAME || 'Global Regulatory Monitor' }}
      GRM_NEWSLETTER_TEST_EMAILS: ${{ vars.GRM_NEWSLETTER_TEST_EMAILS }}
      GRM_SITE_BASE_URL: ${{ vars.GRM_SITE_BASE_URL || 'https://grm-weekly-brief.pages.dev' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Send (gate ③ 멱등 → 캠페인 생성·발송)
        env:
          PUBLISH_DATE: ${{ github.event.inputs.publish_date }}
          MODE: ${{ github.event.inputs.mode }}
        run: |
          python web/newsletter.py \
            --publish-date "$PUBLISH_DATE" \
            --mode "$MODE"
