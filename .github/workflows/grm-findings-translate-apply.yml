name: GRM Findings Translate Apply (M9b)

# [FIND-1 M9b] translations/outbox/ 에 새 배치 파일이 main 에 병합되면(트리거는 M9c 의
# 자동 머지 PR), 순수 결정론 Python 스크립트(findings_translate_apply_service.py)가
# outbox 를 읽어 Supabase(PostgREST)에 finding_text_ko/translation_method 를 PATCH 한다.
# LLM 은 이 워크플로에 전혀 관여하지 않는다 — 번역/판단은 M9c(별도 예약 세션)에서 이미
# 끝난 뒤 outbox JSON 으로 고정되어 여기 도달한다.
#
# ★핵심 제약: 이 워크플로는 git 쓰기를 전혀 하지 않는다 — checkout(read-only) 이후
# 커밋/푸시/PR 생성 스텝이 없다. outbox 파일 이동·삭제도 여기서 하지 않는다. 적용은
# read-before-write(finding_id=PK 로 GET → 원문 대조 → finding_id 로만 PATCH)라 멱등이며,
# 이미 반영된 항목은 동일값 재반영, 원문이 바뀐 항목은 매칭 0건으로 무해하다. finding_text
# 를 URL 에 싣지 않으므로 30,000자급 지적(FDA 경고서한 전문)도 엣지 URL 한도(~32KB)를
# 넘지 않는다 — 2026-07-23 이전에는 이 초과가 HTTP 400 → red + 해당 지적 영구 미반영을 냈다.
#
# ★outbox 누적 금지(2026-07-13 기아 장애): 적용 완료 배치가 outbox 에 수십 개 쌓이면
# 매 실행 전량 재PATCH 가 timeout-minutes(10분)를 초과해 최신 배치가 영구 미반영된다.
# 방어 2겹 — ①스크립트가 최신 파일 우선(역순) 처리 ②M9c 번역 세션이 새 배치 PR 에서
# 직전 apply 성공이 확인된 기존 outbox 배치를 translations/applied/ 로 아카이브.
on:
  push:
    branches: [main]
    paths:
      - 'translations/outbox/**'
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: findings-translate-apply
  cancel-in-progress: false

jobs:
  apply:
    name: Apply queued translation outbox → Supabase
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Set up Python
        uses: actions/setup-python@v6.2.0
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # 읽기(outbox 파일) + PATCH(Supabase) 만 수행한다 — git add/commit/push 없음.
      # SUPABASE_SERVICE_ROLE_KEY 는 grm-intake.yml(M4 야간 적재)이 이미 쓰는 동일 secret
      # 재사용이며, 이 워크플로를 위한 신규 secret 등록은 필요 없다.
      # FIND-1 M13b: items_errored>0 (or any other report["errors"] entry,
      # e.g. a malformed SUPABASE_URL) now makes the script exit 1 -- PATCH
      # retry semantics are unchanged (a failed run's outbox files stay in
      # place — M9c archives a batch only after the apply run that covered
      # it went green — so a future run naturally re-processes anything that
      # failed this time), but the run now goes red instead of silently
      # green so a human notices without having to open the report JSON.
      - name: Apply translation outbox (no git writes — read + PATCH only)
        id: apply
        env:
          SUPABASE_URL: ${{ vars.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          python findings_translate_apply_service.py --output apply_report.json

      - name: Write step summary
        if: always()
        run: |
          {
            echo "### GRM Findings Translate Apply (M9b)"
            echo ""
            if [ -f apply_report.json ]; then
              echo '```json'
              cat apply_report.json
              echo '```'
            else
              echo "apply_report.json 이 생성되지 않았습니다 (스크립트가 exit 2 로 조기 종료했을 수 있습니다 — SUPABASE_URL/SUPABASE_SERVICE_ROLE_KEY 확인)."
            fi
          } >> "$GITHUB_STEP_SUMMARY"
